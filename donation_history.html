<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Donation History | Red Hope</title>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<script src="shared.js"></script>
<script src="notifications.js"></script>
<script src="layout.js"></script>
<script>const user = renderLayout('Donation History', 'donation_history.html');</script>

<div id="page-body" style="display:none;">
  <div class="top-header">
    <div><h1><i class="fa-solid fa-timeline" style="color:var(--red);"></i> My Donation History</h1><p>Track all your life-saving contributions.</p></div>
    <button class="btn-sm" style="background:var(--red);color:white;padding:10px 18px;" onclick="openModal('log-modal')"><i class="fa-solid fa-plus"></i> Log Donation</button>
  </div>
  <div class="stat-grid" style="grid-template-columns:repeat(4,1fr);">
    <div class="stat-card"><div class="val" id="hist-total" style="color:var(--red);">0</div><div class="lbl">Total Donations</div></div>
    <div class="stat-card"><div class="val" id="hist-units" style="color:var(--blue);">0</div><div class="lbl">Blood Units</div></div>
    <div class="stat-card"><div class="val" id="hist-organ" style="color:#8B5CF6;">0</div><div class="lbl">Organ Pledges</div></div>
    <div class="stat-card"><div class="val" id="hist-pts" style="color:var(--green);">0</div><div class="lbl">Total Points</div></div>
  </div>
  <div class="timeline" id="timeline-list"></div>
</div>

<!-- Log Donation Modal -->
<div class="modal-overlay" id="log-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('log-modal')">×</button>
    <h3 style="font-family:'Playfair Display',serif;color:var(--red);margin-bottom:5px;"><i class="fa-solid fa-heart"></i> Log a Donation</h3>
    <p style="color:var(--muted);font-size:.88rem;margin-bottom:20px;">Record your donation and earn +500 points!</p>
    <div class="form-row">
      <div class="form-group"><label>Donation Type</label>
        <select id="log-type" onchange="document.getElementById('organ-div').style.display=this.value==='organ'?'block':'none'">
          <option value="blood">🩸 Blood</option><option value="organ">🩺 Organ Pledge</option><option value="platelet">🟡 Platelet</option><option value="plasma">💙 Plasma</option>
        </select>
      </div>
      <div class="form-group"><label>Blood Group</label>
        <select id="log-bg"><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select>
      </div>
    </div>
    <div class="form-group" id="organ-div" style="display:none;"><label>Organ Donated</label><input type="text" id="log-organ" placeholder="e.g. Kidney, Liver"/></div>
    <div class="form-row">
      <div class="form-group"><label>Location / Hospital *</label><input type="text" id="log-loc" placeholder="City Medical Center"/></div>
      <div class="form-group"><label>Units</label><input type="number" id="log-units" value="1" min="1" max="10"/></div>
    </div>
    <div class="form-group"><label>Date *</label><input type="date" id="log-date"/></div>
    <div class="form-group"><label>Notes (optional)</label><input type="text" id="log-notes" placeholder="Any notes..."/></div>
    <div style="background:#D1FAE5;border:1px solid #6EE7B7;padding:10px 14px;border-radius:8px;font-size:.88rem;color:#065F46;margin-bottom:16px;"><i class="fa-solid fa-star"></i> You'll earn <strong>+500 points</strong>!</div>
    <button class="btn-primary" onclick="logDonation()"><i class="fa-solid fa-heart"></i> Log Donation</button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('main-content').innerHTML = document.getElementById('page-body').innerHTML;
  initNotifications();
  document.getElementById('log-date').value = new Date().toISOString().split('T')[0];
  if(user.blood_group) document.getElementById('log-bg').value = user.blood_group;
  loadHistory();
  document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
});

function loadHistory(){
  const donations = (DB.get('donations')||[]).filter(d=>d.user_id===user.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  let units=0, organCount=0;
  donations.forEach(d=>{ if(d.type==='organ')organCount++; else units+=parseInt(d.units)||1; });
  document.getElementById('hist-total').textContent = donations.length;
  document.getElementById('hist-units').textContent = units;
  document.getElementById('hist-organ').textContent = organCount;
  document.getElementById('hist-pts').textContent = (user.points||0).toLocaleString();
  const tl = document.getElementById('timeline-list');
  if(!tl) return;
  if(!donations.length){
    tl.innerHTML='<div class="glass-card" style="text-align:center;padding:40px;"><i class="fa-solid fa-heart-pulse" style="font-size:3rem;color:var(--red);opacity:.3;"></i><p style="margin-top:12px;color:var(--muted);">No donations logged yet. Log your first donation!</p></div>';
    return;
  }
  const typeColors={blood:'#DC2626',organ:'#8B5CF6',platelet:'#F59E0B',plasma:'#3B82F6'};
  const typeIcons={blood:'fa-droplet',organ:'fa-heart',platelet:'fa-flask',plasma:'fa-vial'};
  tl.innerHTML = donations.map(d=>{
    const col=typeColors[d.type]||'#888';
    const icon=typeIcons[d.type]||'fa-syringe';
    const fd=new Date(d.date).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
    return `<div class="tl-item">
      <div class="tl-dot" style="background:${col};"></div>
      <div class="tl-card" style="border-left:3px solid ${col};">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
          <div>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
              <span class="tag" style="background:${col}20;color:${col};"><i class="fa-solid ${icon}"></i> ${d.type.charAt(0).toUpperCase()+d.type.slice(1)}</span>
              <span style="font-weight:800;color:${col};">${d.blood_group}</span>
              ${d.organ_donated?`<span style="font-size:.82rem;color:var(--muted);">— ${d.organ_donated}</span>`:''}
            </div>
            <div style="font-size:.88rem;"><i class="fa-solid fa-location-dot" style="color:var(--muted);width:16px;"></i> ${d.location}</div>
            ${d.notes?`<div style="font-size:.82rem;color:var(--muted);font-style:italic;margin-top:4px;">"${d.notes}"</div>`:''}
          </div>
          <div style="text-align:right;">
            <div style="font-weight:600;font-size:.9rem;">${fd}</div>
            <div style="font-size:.78rem;color:var(--muted);">${d.units} unit${d.units>1?'s':''}</div>
            <div style="font-size:.75rem;color:var(--green);font-weight:700;margin-top:4px;">+500 pts</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function logDonation(){
  const loc=document.getElementById('log-loc').value.trim();
  const date=document.getElementById('log-date').value;
  if(!loc||!date){alert('Location and date are required.');return;}
  const donations=DB.get('donations')||[];
  donations.push({id:Date.now(),user_id:user.id,type:document.getElementById('log-type').value,blood_group:document.getElementById('log-bg').value,location:loc,units:parseInt(document.getElementById('log-units').value)||1,date,notes:document.getElementById('log-notes').value.trim(),organ_donated:document.getElementById('log-organ')?.value.trim()||''});
  DB.set('donations',donations);
  addPoints(user.id,500);
  notifyDonationLogged(user.id, document.getElementById('log-type').value, document.getElementById('log-bg').value);
  const avail=DB.get('blood_avail')||[];
  const ba=avail.find(a=>a.blood_group===document.getElementById('log-bg').value);
  if(ba){ba.units_available=Math.min(ba.units_available+1,ba.units_needed+20);}
  DB.set('blood_avail',avail);
  closeModal('log-modal');
  alert('✅ Donation logged! You earned +500 points.');
  window.location.reload();
}
</script>
</body>
</html>
