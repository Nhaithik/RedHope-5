<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Red Hope | Blood Donation Network</title>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
.landing{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fff0f0,#fff8f8);position:relative;overflow:hidden;}
.landing-card{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.6);border-radius:28px;padding:60px 55px;max-width:620px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(220,38,38,.12);animation:slideUp .8s cubic-bezier(.175,.885,.32,1.275);}
.landing-card h1{font-family:'Playfair Display',serif;font-size:3.2rem;color:var(--red);margin-bottom:12px;}
.landing-card p{color:var(--muted);font-size:1.05rem;line-height:1.7;margin-bottom:36px;}
.btn-group{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.btn-hero{padding:14px 32px;border-radius:30px;font-size:1rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .3s;border:none;font-family:'DM Sans',sans-serif;cursor:pointer;}
.btn-hero-primary{background:linear-gradient(135deg,#DC2626,#991B1B);color:white;box-shadow:0 8px 24px rgba(220,38,38,.38);}
.btn-hero-primary:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(220,38,38,.5);}
.btn-hero-outline{background:transparent;color:#991B1B;border:2px solid #991B1B;}
.btn-hero-outline:hover{background:rgba(220,38,38,.05);transform:translateY(-3px);}
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px;}
.feature{background:rgba(220,38,38,.04);border:1px solid rgba(220,38,38,.12);border-radius:14px;padding:18px;text-align:center;}
.feature i{font-size:1.6rem;color:var(--red);margin-bottom:8px;display:block;}
.feature strong{display:block;font-size:.9rem;margin-bottom:4px;}
.feature span{font-size:.8rem;color:var(--muted);}
@media(max-width:600px){.features{grid-template-columns:1fr;}.landing-card{padding:40px 28px;}.landing-card h1{font-size:2.4rem;}}
</style>
</head>
<body>
<div class="landing">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="landing-card">
    <div style="width:80px;height:80px;background:linear-gradient(135deg,#DC2626,#991B1B);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:2rem;color:white;box-shadow:0 10px 30px rgba(220,38,38,.4);">
      <i class="fa-solid fa-droplet"></i>
    </div>
    <h1>Red Hope</h1>
    <p>Every drop counts. Connect with blood donors in your community and help save lives — register today and become someone's hero.</p>
    <div class="btn-group">
      <a href="register.html" class="btn-hero btn-hero-primary"><i class="fa-solid fa-user-plus"></i> Register Now</a>
      <a href="login.html" class="btn-hero btn-hero-outline"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
    </div>
    <div class="features">
      <div class="feature"><i class="fa-solid fa-droplet"></i><strong>Find Blood</strong><span>Search donors by blood type nearby</span></div>
      <div class="feature"><i class="fa-solid fa-triangle-exclamation"></i><strong>Urgent Requests</strong><span>Post & respond to critical needs</span></div>
      <div class="feature"><i class="fa-solid fa-trophy"></i><strong>Earn Points</strong><span>Get rewarded for saving lives</span></div>
    </div>
  </div>
</div>
<script src="shared.js"></script>
<script>
  initDB();
  // If already logged in, redirect to dashboard
  if(getCurrentUser()) window.location.href='dashboard.html';
</script>
</body>
</html>
