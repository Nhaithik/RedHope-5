<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Find Donors | Red Hope</title>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<script src="shared.js"></script>
<script src="notifications.js"></script>
<script src="layout.js"></script>
<script>const user = renderLayout('Find Donors', 'donor_search.html');</script>

<div id="page-body" style="display:none;">
  <div class="top-header">
    <div><h1>Find Donors</h1><p>Search our network for available blood donors.</p></div>
  </div>
  <div class="glass-card">
    <div class="form-row" style="margin-bottom:16px;">
      <div class="form-group" style="margin:0;">
        <label>Blood Group</label>
        <select id="search-bg">
          <option value="">Any</option>
          <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
          <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
        </select>
      </div>
      <div class="form-group" style="margin:0;">
        <label>Search by Name</label>
        <input type="text" id="search-name" placeholder="Type to search..."/>
      </div>
    </div>
    <button class="btn-primary" style="width:auto;padding:10px 24px;" onclick="searchDonors()">
      <i class="fa-solid fa-magnifying-glass"></i> Search Network
    </button>
  </div>
  <div id="results-count" style="color:var(--muted);font-size:.88rem;margin-bottom:12px;"></div>
  <div class="donor-grid" id="donor-results"></div>
</div>

<!-- Message Modal -->
<div class="modal-overlay" id="msg-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('msg-modal')">×</button>
    <h3 style="font-family:'Playfair Display',serif;margin-bottom:16px;">Message <span id="msg-to-name" style="color:var(--red);"></span></h3>
    <div class="form-group">
      <label>Your Message</label>
      <textarea id="msg-text" style="height:80px;resize:vertical;" placeholder="Hi! I saw you're available for blood donation..."></textarea>
    </div>
    <button class="btn-primary" onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i> Send Message</button>
  </div>
</div>

<script>
let msgToId = null;
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('main-content').innerHTML = document.getElementById('page-body').innerHTML;
  initNotifications();
  searchDonors();
  document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
});

function searchDonors(){
  const bg = document.getElementById('search-bg')?.value || '';
  const q = (document.getElementById('search-name')?.value || '').toLowerCase();
  const users = DB.get('users') || [];
  let donors = users.filter(u => (u.available_blood || u.available_organ) && u.id !== user.id);
  if(bg) donors = donors.filter(u => u.blood_group === bg);
  if(q) donors = donors.filter(u => u.email.toLowerCase().includes(q));
  const rc = document.getElementById('results-count');
  if(rc) rc.textContent = donors.length ? `Found ${donors.length} donor${donors.length>1?'s':''} matching your criteria` : '';
  const grid = document.getElementById('donor-results');
  if(!grid) return;
  if(!donors.length){
    grid.innerHTML='<div class="glass-card"><p style="color:var(--muted);">No donors found. Try adjusting your filters.</p></div>';
    return;
  }
  grid.innerHTML = donors.map(d => `
    <div class="donor-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <div style="width:44px;height:44px;border-radius:50%;background:var(--red);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;">${d.email[0].toUpperCase()}</div>
        <div>
          <div style="font-weight:700;">${d.email.split('@')[0]}</div>
          <div style="font-size:.8rem;color:var(--muted);">${d.gender||''}${d.age?' · Age '+d.age:''}</div>
        </div>
        <span class="tag" style="background:rgba(220,38,38,.1);color:var(--red);margin-left:auto;font-size:.9rem;font-weight:900;">${d.blood_group}</span>
      </div>
      <div style="font-size:.85rem;margin-bottom:10px;">
        <span style="color:${d.available_blood?'var(--green)':'var(--muted)'};">
          <i class="fa-solid ${d.available_blood?'fa-check':'fa-xmark'}"></i> Blood
        </span>
        &nbsp;&nbsp;
        <span style="color:${d.available_organ?'#8B5CF6':'var(--muted)'};">
          <i class="fa-solid ${d.available_organ?'fa-check':'fa-xmark'}"></i> Organ Pledge
        </span>
      </div>
      ${d.phone?`<div style="font-size:.85rem;margin-bottom:12px;"><i class="fa-solid fa-phone" style="color:var(--muted);width:16px;"></i> ${d.phone}</div>`:''}
      <button class="btn-sm" style="background:var(--red);color:white;width:100%;" onclick="openMsgModal(${d.id},'${d.email.split('@')[0]}')">
        <i class="fa-solid fa-message"></i> Contact Donor
      </button>
    </div>`).join('');
}

function openMsgModal(id, name){
  msgToId = id;
  document.getElementById('msg-to-name').textContent = name;
  openModal('msg-modal');
}

function sendMsg(){
  const txt = document.getElementById('msg-text').value.trim();
  if(!txt){alert('Please enter a message.');return;}
  const msgs = DB.get('messages')||[];
  msgs.push({id:Date.now(),from:user.id,to:msgToId,text:txt,ts:Date.now()});
  notifyNewMessage(msgToId, user.email.split('@')[0]);
  DB.set('messages',msgs);
  closeModal('msg-modal');
  document.getElementById('msg-text').value='';
  alert('Message sent! View it in your Messages page.');
}
</script>
</body>
</html>
