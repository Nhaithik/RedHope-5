<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Donation Camps | Red Hope</title>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
.camp-card{background:white;border-radius:16px;padding:22px;border:1px solid #FEE2E2;position:relative;transition:transform .25s,box-shadow .25s;}
.camp-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(220,38,38,.1);}
.camp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.camp-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}
.reg-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.reg-chip{background:#FFF8F8;border:1px solid #FEE2E2;border-radius:8px;padding:6px 10px;font-size:.8rem;display:flex;align-items:center;gap:8px;}
</style>
</head>
<body>
<script src="shared.js"></script>
<script src="notifications.js"></script>
<script src="layout.js"></script>
<script>const user = renderLayout('Donation Camps', 'donation_camps.html');</script>

<div id="page-body" style="display:none;">
  <div class="top-header">
    <div>
      <h1><i class="fa-solid fa-campground" style="color:var(--red);"></i> Donation Camps</h1>
      <p style="color:var(--muted);">Register for upcoming blood donation events and earn +50 points!</p>
    </div>
    <button class="btn-sm" style="background:var(--red);color:white;padding:10px 18px;" onclick="openModal('new-camp-modal')">
      <i class="fa-solid fa-plus"></i> Add Camp
    </button>
  </div>

  <!-- My Registrations Banner -->
  <div id="my-regs-banner" style="display:none;margin-bottom:20px;"></div>

  <!-- Filter -->
  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
    <button class="filter-btn active" onclick="filterCamps('all',this)">All Camps</button>
    <button class="filter-btn" onclick="filterCamps('upcoming',this)">Upcoming</button>
    <button class="filter-btn" onclick="filterCamps('today',this)">Today</button>
    <button class="filter-btn" onclick="filterCamps('registered',this)">My Registrations</button>
  </div>

  <div class="camp-grid" id="camps-grid"></div>
</div>

<!-- New Camp Modal -->
<div class="modal-overlay" id="new-camp-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('new-camp-modal')">×</button>
    <h3 style="font-family:'Playfair Display',serif;color:var(--red);margin-bottom:18px;"><i class="fa-solid fa-campground"></i> Organise a Camp</h3>
    <div class="form-group"><label>Camp Name *</label><input type="text" id="camp-name" placeholder="e.g. Community Blood Drive 2026"/></div>
    <div class="form-row">
      <div class="form-group"><label>Date *</label><input type="date" id="camp-date"/></div>
      <div class="form-group"><label>Time</label><input type="time" id="camp-time" value="09:00"/></div>
    </div>
    <div class="form-group"><label>Venue / Location *</label><input type="text" id="camp-venue" placeholder="e.g. City Hall, Mumbai"/></div>
    <div class="form-group"><label>Organiser</label><input type="text" id="camp-org" placeholder="e.g. Red Hope Community"/></div>
    <div class="form-group"><label>Expected Slots</label><input type="number" id="camp-slots" value="50" min="1" max="500"/></div>
    <div class="form-group"><label>Description</label><textarea id="camp-desc" style="height:70px;resize:vertical;" placeholder="Any details about the camp..."></textarea></div>
    <div style="background:#D1FAE5;border:1px solid #6EE7B7;padding:10px 14px;border-radius:8px;font-size:.85rem;color:#065F46;margin-bottom:16px;"><i class="fa-solid fa-star"></i> Registering earns <strong>+50 points</strong>!</div>
    <button class="btn-primary" onclick="createCamp()"><i class="fa-solid fa-paper-plane"></i> Create Camp</button>
  </div>
</div>

<style>
.filter-btn{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s;}
.filter-btn.active,.filter-btn:hover{background:var(--red);color:white;border-color:var(--red);}
</style>

<script>
let campFilter = 'all';

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('main-content').innerHTML = document.getElementById('page-body').innerHTML;
  initNotifications();
  document.getElementById('camp-date').value = new Date().toISOString().split('T')[0];
  initCamps();
  renderCamps();
  document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); }));
});

function initCamps() {
  if (!DB.get('camps')) {
    const today = new Date();
    const d = (offset) => new Date(today.getTime() + offset * 86400000).toISOString().split('T')[0];
    DB.set('camps', [
      { id:1, name:'Red Hope City Drive', date:d(3), time:'09:00', venue:'City Community Hall, Mumbai', organiser:'Red Hope Team', slots:100, desc:'Our flagship donation drive. All blood groups welcome!', created_by:1, registrations:[] },
      { id:2, name:'Weekend Blood Camp', date:d(7), time:'10:00', venue:'Apollo Hospital Lobby, Delhi', organiser:'Apollo Foundation', slots:60, desc:'Convenient weekend camp near Apollo Hospital.', created_by:1, registrations:[] },
      { id:3, name:'University Campus Drive', date:d(14), time:'08:30', venue:'BITS Pilani Campus', organiser:'NSS Chapter', slots:200, desc:'Annual student-driven blood donation camp.', created_by:1, registrations:[] },
      { id:4, name:'Corporate Donation Day', date:d(1), time:'11:00', venue:'Infosys Campus, Bangalore', organiser:'Infosys CSR', slots:80, desc:'Join hundreds of colleagues saving lives.', created_by:1, registrations:[] },
    ]);
    DB.set('next_cid', 5);
  }
}

function renderCamps() {
  const camps = DB.get('camps') || [];
  const today = new Date().toISOString().split('T')[0];
  let filtered = camps;
  if (campFilter === 'upcoming') filtered = camps.filter(c => c.date >= today);
  else if (campFilter === 'today') filtered = camps.filter(c => c.date === today);
  else if (campFilter === 'registered') filtered = camps.filter(c => (c.registrations || []).includes(user.id));

  // My registrations banner
  const myRegs = camps.filter(c => (c.registrations || []).includes(user.id) && c.date >= today);
  const banner = document.getElementById('my-regs-banner');
  if (banner) {
    if (myRegs.length > 0) {
      banner.style.display = 'block';
      banner.innerHTML = `<div style="background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(16,185,129,.04));border:1px solid rgba(16,185,129,.25);border-left:4px solid var(--green);padding:14px 20px;border-radius:12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
        <i class="fa-solid fa-calendar-check" style="font-size:1.8rem;color:var(--green);"></i>
        <div style="flex:1;"><strong style="color:var(--green);">You're registered for ${myRegs.length} upcoming camp${myRegs.length>1?'s':''}!</strong>
        <div style="font-size:.85rem;color:var(--muted);margin-top:2px;">${myRegs.map(c=>`${c.name} — ${formatDate(c.date)}`).join(' &nbsp;|&nbsp; ')}</div></div>
      </div>`;
    } else { banner.style.display = 'none'; }
  }

  const grid = document.getElementById('camps-grid');
  if (!grid) return;
  if (!filtered.length) {
    grid.innerHTML = `<div class="glass-card" style="text-align:center;padding:50px;grid-column:1/-1;">
      <i class="fa-solid fa-campground" style="font-size:3rem;opacity:.2;color:var(--red);"></i>
      <p style="margin-top:14px;color:var(--muted);">No camps found. Be the first to organise one!</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(camp => {
    const isRegistered = (camp.registrations || []).includes(user.id);
    const regCount = (camp.registrations || []).length;
    const spotsLeft = (camp.slots || 50) - regCount;
    const isPast = camp.date < new Date().toISOString().split('T')[0];
    const isToday = camp.date === new Date().toISOString().split('T')[0];
    const pct = Math.min(100, Math.round((regCount / (camp.slots || 50)) * 100));
    const statusBg = isPast ? '#F3F4F6' : isToday ? '#FEF3C7' : '#D1FAE5';
    const statusColor = isPast ? '#6B7280' : isToday ? '#92400E' : '#065F46';
    const statusLabel = isPast ? '✓ Completed' : isToday ? '⚡ Today!' : `📅 ${formatDate(camp.date)}`;

    return `<div class="camp-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:10px;">
        <h3 style="font-family:'Playfair Display',serif;font-size:1.05rem;line-height:1.3;">${camp.name}</h3>
        <span class="camp-badge" style="background:${statusBg};color:${statusColor};white-space:nowrap;">${statusLabel}</span>
      </div>
      <div style="font-size:.85rem;display:flex;flex-direction:column;gap:5px;margin-bottom:14px;">
        <div><i class="fa-solid fa-clock" style="color:var(--muted);width:16px;"></i> ${camp.time || '09:00'}</div>
        <div><i class="fa-solid fa-location-dot" style="color:var(--muted);width:16px;"></i> ${camp.venue}</div>
        <div><i class="fa-solid fa-user-tie" style="color:var(--muted);width:16px;"></i> ${camp.organiser}</div>
      </div>
      ${camp.desc ? `<p style="font-size:.82rem;color:var(--muted);margin-bottom:12px;font-style:italic;">"${camp.desc}"</p>` : ''}
      <div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:5px;">
          <span><i class="fa-solid fa-users"></i> ${regCount} registered</span>
          <span>${spotsLeft > 0 ? `${spotsLeft} spots left` : '<span style="color:var(--red);font-weight:700;">FULL</span>'}</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${pct>=100?'var(--red)':'var(--green)'};"></div></div>
      </div>
      ${!isPast ? `
        <div style="display:flex;gap:8px;">
          ${isRegistered
            ? `<button class="btn-sm btn-outline" style="flex:1;" onclick="unregisterCamp(${camp.id})"><i class="fa-solid fa-xmark"></i> Cancel Registration</button>`
            : spotsLeft > 0
              ? `<button class="btn-sm" style="flex:1;background:var(--green);color:white;" onclick="registerCamp(${camp.id})"><i class="fa-solid fa-calendar-plus"></i> Register (+50 pts)</button>`
              : `<button class="btn-sm" disabled style="flex:1;background:#F3F4F6;color:var(--muted);cursor:not-allowed;">Camp Full</button>`
          }
          ${isRegistered ? `<button class="btn-sm" style="background:var(--red-light);color:var(--red-dark);" onclick="viewRegistrants(${camp.id})"><i class="fa-solid fa-list"></i></button>` : ''}
        </div>` : `<div style="font-size:.82rem;color:var(--muted);text-align:center;padding:6px;background:#F9FAFB;border-radius:8px;">This camp has concluded. Thank you to all ${regCount} participants! ❤️</div>`
      }
    </div>`;
  }).join('');
}

function registerCamp(id) {
  const camps = DB.get('camps') || [];
  const camp = camps.find(c => c.id === id);
  if (!camp) return;
  if (!camp.registrations) camp.registrations = [];
  if (camp.registrations.includes(user.id)) return;
  camp.registrations.push(user.id);
  DB.set('camps', camps);
  addPoints(user.id, 50);
  Notif.push(user.id, 'points_earned', `✅ Registered: ${camp.name}`, `You earned +50 points! Camp on ${formatDate(camp.date)} at ${camp.venue}.`, 'donation_camps.html');
  renderCamps();
  Notif.showToast('points_earned', 'Registered!', `+50 points earned for ${camp.name}`);
  // Update topbar
  document.getElementById('topbar-pts').textContent = (getCurrentUser()?.points || 0).toLocaleString();
}

function unregisterCamp(id) {
  if (!confirm('Cancel your registration for this camp?')) return;
  const camps = DB.get('camps') || [];
  const camp = camps.find(c => c.id === id);
  if (!camp) return;
  camp.registrations = (camp.registrations || []).filter(uid => uid !== user.id);
  DB.set('camps', camps);
  addPoints(user.id, -50);
  renderCamps();
}

function viewRegistrants(id) {
  const camp = (DB.get('camps') || []).find(c => c.id === id);
  if (!camp) return;
  const users = DB.get('users') || [];
  const names = (camp.registrations || []).map(uid => {
    const u = users.find(x => x.id === uid);
    return u ? u.email.split('@')[0] + ` (${u.blood_group})` : 'Unknown';
  });
  alert(`Registrants for "${camp.name}":\n\n${names.join('\n') || 'None yet'}`);
}

function createCamp() {
  const name = document.getElementById('camp-name').value.trim();
  const date = document.getElementById('camp-date').value;
  const venue = document.getElementById('camp-venue').value.trim();
  if (!name || !date || !venue) { alert('Name, date, and venue are required.'); return; }
  const camps = DB.get('camps') || [];
  const nid = DB.get('next_cid') || 10;
  const camp = { id:nid, name, date, time:document.getElementById('camp-time').value, venue, organiser:document.getElementById('camp-org').value.trim()||user.email.split('@')[0], slots:parseInt(document.getElementById('camp-slots').value)||50, desc:document.getElementById('camp-desc').value.trim(), created_by:user.id, registrations:[] };
  camps.push(camp);
  DB.set('camps', camps);
  DB.set('next_cid', nid + 1);
  // Broadcast to all users
  Notif.broadcast('system', `🏕️ New Donation Camp: ${name}`, `${formatDate(date)} at ${venue}. Register now to earn +50 points!`, 'donation_camps.html', user.id);
  closeModal('new-camp-modal');
  renderCamps();
  ['camp-name','camp-venue','camp-org','camp-desc'].forEach(id => { const el=document.getElementById(id); if(el)el.value=''; });
}

function filterCamps(f, btn) {
  campFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCamps();
}

function formatDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}
</script>
</body>
</html>
