<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Notifications | Red Hope</title>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<script src="shared.js"></script>
<script src="notifications.js"></script>
<script src="layout.js"></script>
<script>const user = renderLayout('Notifications', 'notifications.html');</script>

<div id="page-body" style="display:none;">
  <div class="top-header">
    <div>
      <h1><i class="fa-solid fa-bell" style="color:var(--red);"></i> Notifications</h1>
      <p id="notif-subtitle" style="color:var(--muted);">Loading...</p>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-outline" onclick="markAllRead()"><i class="fa-solid fa-check-double"></i> Mark All Read</button>
      <button class="btn-sm" style="background:var(--red-light);color:var(--red-dark);padding:9px 18px;" onclick="clearAll()"><i class="fa-solid fa-trash"></i> Clear All</button>
    </div>
  </div>

  <!-- Filter tabs -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;" id="filter-tabs">
    <button class="filter-tab active" data-filter="all"     onclick="setFilter('all',this)">All</button>
    <button class="filter-tab" data-filter="urgent_request" onclick="setFilter('urgent_request',this)"><i class="fa-solid fa-triangle-exclamation"></i> Urgent</button>
    <button class="filter-tab" data-filter="message"        onclick="setFilter('message',this)"><i class="fa-solid fa-message"></i> Messages</button>
    <button class="filter-tab" data-filter="donation_logged"onclick="setFilter('donation_logged',this)"><i class="fa-solid fa-heart"></i> Donations</button>
    <button class="filter-tab" data-filter="blood_critical" onclick="setFilter('blood_critical',this)"><i class="fa-solid fa-droplet"></i> Blood Alerts</button>
    <button class="filter-tab" data-filter="leaderboard"    onclick="setFilter('leaderboard',this)"><i class="fa-solid fa-trophy"></i> Leaderboard</button>
  </div>

  <div class="notif-page-list" id="notif-list"></div>
</div>

<style>
.filter-tab {
  padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border);
  background: white; font-family: 'DM Sans', sans-serif; font-size: .82rem;
  font-weight: 600; cursor: pointer; color: var(--muted); transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.filter-tab:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }
.filter-tab.active { background: var(--red); color: white; border-color: var(--red); }
</style>

<script>
let currentFilter = 'all';

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('main-content').innerHTML = document.getElementById('page-body').innerHTML;
  initNotifications();
  renderList();
});

function renderList() {
  let notifs = Notif.getAll(user.id);
  if (currentFilter !== 'all') notifs = notifs.filter(n => n.type === currentFilter);

  const unread = notifs.filter(n => !n.read).length;
  const sub = document.getElementById('notif-subtitle');
  if (sub) sub.textContent = notifs.length
    ? `${notifs.length} notification${notifs.length > 1 ? 's' : ''} — ${unread} unread`
    : 'No notifications';

  const list = document.getElementById('notif-list');
  if (!list) return;

  if (!notifs.length) {
    list.innerHTML = `
      <div style="text-align:center;padding:80px 20px;background:white;border-radius:16px;border:1px solid #FEE2E2;">
        <i class="fa-solid fa-bell-slash" style="font-size:3.5rem;color:var(--red);opacity:.2;"></i>
        <h3 style="margin-top:16px;font-family:'Playfair Display',serif;color:var(--text);">
          ${currentFilter === 'all' ? "You're all caught up!" : 'No notifications here'}
        </h3>
        <p style="margin-top:8px;color:var(--muted);font-size:.9rem;">
          ${currentFilter === 'all' ? 'New notifications will appear here.' : 'Try a different filter.'}
        </p>
      </div>`;
    return;
  }

  list.innerHTML = notifs.map(n => {
    const meta = Notif.ICONS[n.type] || Notif.ICONS.system;
    const ago = Notif._timeAgo(n.ts);
    const date = new Date(n.ts).toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    return `
      <div class="notif-page-item ${n.read ? '' : 'unread'}" onclick="handleClick(${n.id},'${n.link||''}')">
        <div style="width:46px;height:46px;border-radius:50%;background:${meta.bg};color:${meta.color};display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;">
          <i class="fa-solid ${meta.icon}"></i>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;">
            <div style="font-weight:700;font-size:.92rem;">${n.title}</div>
            <div style="font-size:.75rem;color:#CBD5E1;white-space:nowrap;">${date}</div>
          </div>
          <div style="font-size:.83rem;color:var(--muted);margin-top:3px;line-height:1.4;">${n.body}</div>
          <div style="font-size:.75rem;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:8px;">
            <span>${ago}</span>
            ${!n.read ? '<span style="background:var(--red);color:white;padding:2px 7px;border-radius:10px;font-size:.68rem;font-weight:700;">NEW</span>' : ''}
            ${n.link ? '<span style="color:var(--red);font-weight:600;">View →</span>' : ''}
          </div>
        </div>
        <button onclick="event.stopPropagation();deleteNotif(${n.id})" style="background:none;border:none;font-size:1.1rem;color:#D1D5DB;cursor:pointer;padding:0 4px;flex-shrink:0;transition:color .2s;" onmouseover="this.style.color='#DC2626'" onmouseout="this.style.color='#D1D5DB'">×</button>
      </div>`;
  }).join('');
}

function handleClick(id, link) {
  Notif.markRead(user.id, id);
  if (link) window.location.href = link;
  else renderList();
}
function deleteNotif(id) {
  Notif.delete(user.id, id);
  renderList();
}
function markAllRead() {
  Notif.markAllRead(user.id);
  renderList();
}
function clearAll() {
  if (!confirm('Clear all notifications?')) return;
  Notif.clearAll(user.id);
  renderList();
}
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}
</script>
</body>
</html>
