<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Login | Red Hope</title>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="fa-solid fa-droplet"></i></div>
      <h1>Red Hope</h1>
      <p>Login to your dashboard</p>
    </div>
    <div id="login-error" class="error-msg"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
    <div class="auth-switch">Don't have an account? <a href="register.html">Register here</a></div>
    <div class="auth-switch" style="margin-top:8px;"><a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a></div>
    <div style="margin-top:20px;background:#FFF8F8;border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:.82rem;color:var(--muted);">
      <strong style="color:var(--red);">Demo Admin:</strong> admin@redhope.com / Admin@1234
    </div>
  </div>
</div>
<script src="shared.js"></script>
<script>
initDB();
if(getCurrentUser()) window.location.href='dashboard.html';

function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-error');
  err.style.display='none';
  if(!email||!pass){err.textContent='Please enter both email and password.';err.style.display='block';return;}
  const users=DB.get('users')||[];
  const user=users.find(u=>u.email===email&&u.password===pass);
  if(!user){err.textContent='Incorrect email or password.';err.style.display='block';return;}
  DB.set('session',user.id);
  const today=new Date().toDateString();
  if(DB.get('last_login_'+user.id)!==today){
    DB.set('last_login_'+user.id,today);
    addPoints(user.id,10);
  }
  window.location.href='dashboard.html';
}
document.addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
